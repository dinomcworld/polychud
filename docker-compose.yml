services:
  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - bot-net
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-polymarket_bot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - bot-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  bot-net:
    driver: bridge
