name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          source: docker-compose.prod.yml
          target: /opt/polychud

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'polymarket_bot' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'bot' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          POLYMARKET_GAMMA_URL: ${{ vars.POLYMARKET_GAMMA_URL || 'https://gamma-api.polymarket.com' }}
          POLYMARKET_CLOB_URL: ${{ vars.POLYMARKET_CLOB_URL || 'https://clob.polymarket.com' }}
          POLL_CYCLE_MS: ${{ vars.POLL_CYCLE_MS || '3600000' }}
          RESOLUTION_CHECK_CRON: ${{ vars.RESOLUTION_CHECK_CRON || '*/30 * * * *' }}
          ON_DEMAND_CACHE_TTL_MS: ${{ vars.ON_DEMAND_CACHE_TTL_MS || '60000' }}
          CLOSE_BET_PRICE_MAX_AGE_MS: ${{ vars.CLOSE_BET_PRICE_MAX_AGE_MS || '30000' }}
          DEFAULT_STARTING_POINTS: ${{ vars.DEFAULT_STARTING_POINTS || '1000' }}
          DEFAULT_MAX_BET: ${{ vars.DEFAULT_MAX_BET || '500' }}
          DEFAULT_MIN_BET: ${{ vars.DEFAULT_MIN_BET || '10' }}
          DEFAULT_DAILY_BONUS: ${{ vars.DEFAULT_DAILY_BONUS || '100' }}
          MAX_ACTIVE_BETS_PER_USER: ${{ vars.MAX_ACTIVE_BETS_PER_USER || '10' }}
          MAX_ACTIVE_BETS_PER_MARKET: ${{ vars.MAX_ACTIVE_BETS_PER_MARKET || '3' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          envs: DISCORD_TOKEN,DISCORD_CLIENT_ID,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_USER,DATABASE_URL,NODE_ENV,POLYMARKET_GAMMA_URL,POLYMARKET_CLOB_URL,POLL_CYCLE_MS,RESOLUTION_CHECK_CRON,ON_DEMAND_CACHE_TTL_MS,CLOSE_BET_PRICE_MAX_AGE_MS,DEFAULT_STARTING_POINTS,DEFAULT_MAX_BET,DEFAULT_MIN_BET,DEFAULT_DAILY_BONUS,MAX_ACTIVE_BETS_PER_USER,MAX_ACTIVE_BETS_PER_MARKET,LOG_LEVEL,GHCR_IMAGE
          script: |
            cd /opt/polychud
            cat > .env << EOF
            DISCORD_TOKEN=${DISCORD_TOKEN}
            DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
            DATABASE_URL=${DATABASE_URL}
            NODE_ENV=${NODE_ENV}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POLYMARKET_GAMMA_URL=${POLYMARKET_GAMMA_URL}
            POLYMARKET_CLOB_URL=${POLYMARKET_CLOB_URL}
            POLL_CYCLE_MS=${POLL_CYCLE_MS}
            RESOLUTION_CHECK_CRON=${RESOLUTION_CHECK_CRON}
            ON_DEMAND_CACHE_TTL_MS=${ON_DEMAND_CACHE_TTL_MS}
            CLOSE_BET_PRICE_MAX_AGE_MS=${CLOSE_BET_PRICE_MAX_AGE_MS}
            DEFAULT_STARTING_POINTS=${DEFAULT_STARTING_POINTS}
            DEFAULT_MAX_BET=${DEFAULT_MAX_BET}
            DEFAULT_MIN_BET=${DEFAULT_MIN_BET}
            DEFAULT_DAILY_BONUS=${DEFAULT_DAILY_BONUS}
            MAX_ACTIVE_BETS_PER_USER=${MAX_ACTIVE_BETS_PER_USER}
            MAX_ACTIVE_BETS_PER_MARKET=${MAX_ACTIVE_BETS_PER_MARKET}
            LOG_LEVEL=${LOG_LEVEL}
            EOF
            chmod 600 .env
            docker pull ${GHCR_IMAGE}
            docker run --rm \
              -e DISCORD_TOKEN=${DISCORD_TOKEN} \
              -e DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID} \
              -e DATABASE_URL=${DATABASE_URL} \
              ${GHCR_IMAGE} bun run dist/deploy-commands.js
            docker compose -f docker-compose.prod.yml up -d --force-recreate bot
            docker image prune -f
